<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안전보건 의견 처리 완료</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .lang-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .lang-btn {
      min-width: 64px;
      height: 42px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      padding: 0 12px;
    }

    .lang-btn.active {
      border-color: #1565c0;
      background: #eaf2ff;
    }

    .page-title {
      margin: 10px 0 8px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
    }

    .page-desc {
      text-align: center;
      color: #666;
      margin: 0 0 18px;
      line-height: 1.6;
    }

    .top-box {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.10);
      margin-bottom: 16px;
    }

    .refresh-btn {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 10px;
      background: #1565c0;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .msg {
      min-height: 22px;
      margin-top: 10px;
      font-size: 13px;
      white-space: pre-line;
      text-align: center;
    }

    .msg.info { color: #666; }
    .msg.error { color: #d93025; }
    .msg.success { color: #188038; }

    .list {
      display: grid;
      gap: 16px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.10);
    }

    .card-title {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 700;
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .block-title {
      margin: 14px 0 8px;
      font-size: 15px;
      font-weight: 700;
    }

    .text-box {
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .photo-card {
      border: 1px solid #e5e7eb;
      background: #fafafa;
      border-radius: 14px;
      padding: 12px;
    }

    .photo-label {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .photo-box {
      width: 100%;
      min-height: 180px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px;
    }

    .photo-box img {
      max-width: 100%;
      max-height: 320px;
      display: block;
      border-radius: 10px;
    }

    .photo-empty {
      color: #888;
      font-size: 14px;
    }

    .bottom-logo-wrap {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .bottom-logo {
      width: 120px;
      max-width: 34vw;
      display: block;
    }

    @media (max-width: 700px) {
      .photo-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="ko" onclick="changeLanguage('ko', this)">🇰🇷</button>
      <button class="lang-btn" data-lang="zh-CN" onclick="changeLanguage('zh-CN', this)">🇨🇳</button>
      <button class="lang-btn" data-lang="en" onclick="changeLanguage('en', this)">🇺🇸</button>
      <button class="lang-btn" data-lang="vi" onclick="changeLanguage('vi', this)">🇻🇳</button>
    </div>

    <h1 id="pageTitle" class="page-title">안전보건 의견 처리 완료</h1>
    <p id="pageDesc" class="page-desc">최근 처리 완료된 의견 10건을 표시합니다.</p>

    <div class="top-box">
      <button id="refreshBtn" class="refresh-btn" type="button" onclick="loadRecentCompleted()">새로고침</button>
      <div id="pageMsg" class="msg info"></div>
    </div>

    <div id="list" class="list"></div>

    <div class="bottom-logo-wrap">
      <img class="bottom-logo" src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/logo.png" alt="logo">
    </div>
  </div>

  <script>
    const ACTION_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHJuhC-Jt-9wO-TNN_THnQIcCISCJx_S6uf4DmKaPuZP_sIdC03DCtmHHCkoYxjwCGqg/exec";

    const I18N = {
      "ko": {
        pageTitle: "안전보건 의견 처리 완료",
        pageDesc: "최근 처리 완료된 의견 10건을 표시합니다.",
        refresh: "새로고침",
        loading: "불러오는 중...",
        loaded: (n) => `최근 처리 완료 ${n}건`,
        loadError: "목록을 불러오지 못했습니다.",
        empty: "처리 완료 내역이 없습니다.",
        receiptTime: "접수시간",
        location: "위치",
        company: "업체명",
        category: "구분",
        actor: "조치자",
        actionTime: "조치시간",
        receiptContent: "접수내용",
        actionContent: "조치내용",
        photos: "사진",
        receiptPhoto: "접수사진",
        actionPhoto: "조치사진",
        noPhoto: "사진 없음",
        queryError: "조회 중 오류가 발생했습니다."
      },
      "zh-CN": {
        pageTitle: "安全与健康意见处理完成",
        pageDesc: "显示最近完成处理的10条意见。",
        refresh: "刷新",
        loading: "正在加载...",
        loaded: (n) => `最近完成处理 ${n} 条`,
        loadError: "无法加载列表。",
        empty: "没有已完成处理的记录。",
        receiptTime: "提交时间",
        location: "位置",
        company: "公司",
        category: "分类",
        actor: "处理人",
        actionTime: "处理时间",
        receiptContent: "提交内容",
        actionContent: "处理内容",
        photos: "照片",
        receiptPhoto: "提交照片",
        actionPhoto: "处理照片",
        noPhoto: "无照片",
        queryError: "查询时发生错误。"
      },
      "en": {
        pageTitle: "Safety and Health Feedback Completed",
        pageDesc: "Showing the latest 10 completed feedback items.",
        refresh: "Refresh",
        loading: "Loading...",
        loaded: (n) => `Latest completed: ${n}`,
        loadError: "Failed to load the list.",
        empty: "There are no completed items.",
        receiptTime: "Submitted At",
        location: "Location",
        company: "Company",
        category: "Category",
        actor: "Handled By",
        actionTime: "Handled At",
        receiptContent: "Submitted Content",
        actionContent: "Action Taken",
        photos: "Photos",
        receiptPhoto: "Submitted Photo",
        actionPhoto: "Action Photo",
        noPhoto: "No photo",
        queryError: "An error occurred while loading."
      },
      "vi": {
        pageTitle: "Hoàn tất xử lý ý kiến an toàn sức khỏe",
        pageDesc: "Hiển thị 10 ý kiến đã được xử lý gần nhất.",
        refresh: "Làm mới",
        loading: "Đang tải...",
        loaded: (n) => `Đã xử lý gần đây: ${n}`,
        loadError: "Không thể tải danh sách.",
        empty: "Không có dữ liệu đã xử lý.",
        receiptTime: "Thời gian gửi",
        location: "Vị trí",
        company: "Công ty",
        category: "Phân loại",
        actor: "Người xử lý",
        actionTime: "Thời gian xử lý",
        receiptContent: "Nội dung gửi",
        actionContent: "Nội dung xử lý",
        photos: "Hình ảnh",
        receiptPhoto: "Ảnh gửi",
        actionPhoto: "Ảnh xử lý",
        noPhoto: "Không có ảnh",
        queryError: "Đã xảy ra lỗi khi tải dữ liệu."
      }
    };

    let currentLang = "ko";
    let originalItems = [];
    const translationCache = {};

    async function postAction(formData) {
      const res = await fetch(ACTION_SCRIPT_URL, {
        method: "POST",
        body: formData
      });
      return await res.json();
    }

    function setMsg(text, type) {
      const el = document.getElementById("pageMsg");
      el.textContent = text || "";
      el.className = "msg " + (type || "info");
    }

    function applyStaticI18n() {
      const t = I18N[currentLang] || I18N.ko;
      document.getElementById("pageTitle").textContent = t.pageTitle;
      document.getElementById("pageDesc").textContent = t.pageDesc;
      document.getElementById("refreshBtn").textContent = t.refresh;
    }

    async function loadRecentCompleted() {
      const t = I18N[currentLang] || I18N.ko;
      setMsg(t.loading, "info");

      try {
        const fd = new URLSearchParams();
        fd.append("action", "getRecentCompleted");

        const data = await postAction(fd);

        if (!data.ok) {
          setMsg(data.message || t.loadError, "error");
          return;
        }

        originalItems = data.items || [];
        await renderCurrentLanguage();
        setMsg(t.loaded(originalItems.length), "success");
      } catch (err) {
        console.error(err);
        setMsg(t.queryError, "error");
      }
    }

    async function changeLanguage(lang, btn) {
      currentLang = lang;
      document.querySelectorAll(".lang-btn").forEach(el => el.classList.remove("active"));
      if (btn) btn.classList.add("active");

      applyStaticI18n();

      if (!originalItems.length) return;

      const t = I18N[currentLang] || I18N.ko;
      setMsg(t.loading, "info");
      await renderCurrentLanguage();
      setMsg(t.loaded(originalItems.length), "success");
    }

    async function renderCurrentLanguage() {
      const items = await getTranslatedItemsForLang(currentLang);
      renderList(items);
    }

    async function getTranslatedItemsForLang(lang) {
      if (lang === "ko") {
        return originalItems.map(item => ({ ...item }));
      }

      if (translationCache[lang]) {
        return translationCache[lang];
      }

      const texts = [];
      originalItems.forEach(item => {
        texts.push(item.location || "");
        texts.push(item.category || "");
        texts.push(item.content || "");
        texts.push(item.actionContent || "");
      });

      const fd = new URLSearchParams();
      fd.append("action", "translateBatch");
      fd.append("targetLang", lang);
      fd.append("textsJson", JSON.stringify(texts));

      const data = await postAction(fd);

      if (!data.ok || !Array.isArray(data.translated)) {
        return originalItems.map(item => ({ ...item }));
      }

      let idx = 0;
      const translatedItems = originalItems.map(item => {
        const translated = {
          ...item,
          location: data.translated[idx++] || item.location || "",
          category: data.translated[idx++] || item.category || "",
          content: data.translated[idx++] || item.content || "",
          actionContent: data.translated[idx++] || item.actionContent || ""
        };
        return translated;
      });

      translationCache[lang] = translatedItems;
      return translatedItems;
    }

    function renderList(items) {
      const t = I18N[currentLang] || I18N.ko;
      const list = document.getElementById("list");

      if (!items.length) {
        list.innerHTML = `
          <div class="card">
            <h2 class="card-title">${escapeHtml(t.empty)}</h2>
          </div>
        `;
        return;
      }

      list.innerHTML = items.map(item => `
        <div class="card">
          <h2 class="card-title">${escapeHtml(item.receiptId)}</h2>

          <div class="meta">
            <div><strong>${escapeHtml(t.receiptTime)}</strong> : ${escapeHtml(item.receiptTime || "")}</div>
            <div><strong>${escapeHtml(t.location)}</strong> : ${escapeHtml(item.location || "")}</div>
            <div><strong>${escapeHtml(t.company)}</strong> : ${escapeHtml(item.company || "")}</div>
            <div><strong>${escapeHtml(t.category)}</strong> : ${escapeHtml(item.category || "")}</div>
            <div><strong>${escapeHtml(t.actor)}</strong> : ${escapeHtml(item.actor || "")}</div>
            <div><strong>${escapeHtml(t.actionTime)}</strong> : ${escapeHtml(item.actionTime || "")}</div>
          </div>

          <div class="block-title">${escapeHtml(t.receiptContent)}</div>
          <div class="text-box">${escapeHtml(item.content || "")}</div>

          <div class="block-title">${escapeHtml(t.actionContent)}</div>
          <div class="text-box">${escapeHtml(item.actionContent || "")}</div>

          <div class="block-title">${escapeHtml(t.photos)}</div>
          <div class="photo-grid">
            <div class="photo-card">
              <div class="photo-label">${escapeHtml(t.receiptPhoto)}</div>
              <div class="photo-box">
                ${item.receiptPhotoUrl
                  ? `<img src="${escapeAttr(item.receiptPhotoUrl)}" alt="${escapeAttr(t.receiptPhoto)}" referrerpolicy="no-referrer">`
                  : `<div class="photo-empty">${escapeHtml(t.noPhoto)}</div>`}
              </div>
            </div>

            <div class="photo-card">
              <div class="photo-label">${escapeHtml(t.actionPhoto)}</div>
              <div class="photo-box">
                ${item.actionPhotoUrl
                  ? `<img src="${escapeAttr(item.actionPhotoUrl)}" alt="${escapeAttr(t.actionPhoto)}" referrerpolicy="no-referrer">`
                  : `<div class="photo-empty">${escapeHtml(t.noPhoto)}</div>`}
              </div>
            </div>
          </div>
        </div>
      `).join("");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(str) {
      return String(str || "").replace(/"/g, "&quot;");
    }

    applyStaticI18n();
    loadRecentCompleted();
  </script>
</body>
</html>
