<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    .lang-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .flag {
      width: 32px;
      height: 22px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 4px;
    }
    .flag.active {
      border-color: #2f6fed;
    }
    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 24px;
      line-height: 1.35;
    }
    .desc {
      margin: 0 0 20px;
      text-align: center;
      color: #555;
      line-height: 1.5;
      white-space: pre-line;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }
    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      font-size: 16px;
    }
    input[type="text"],
    textarea {
      border: 1px solid #cfd7e6;
      border-radius: 10px;
      padding: 12px;
      outline: none;
      background: #fff;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.45;
    }
    .photo-help,
    .bottom-note {
      font-size: 13px;
      color: #666;
      line-height: 1.45;
    }
    .submit-btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      background: #2f6fed;
      color: white;
      margin-top: 8px;
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      line-height: 1.45;
      font-weight: 700;
    }
    .status.success {
      display: block;
      background: #eaf7ed;
      color: #18794e;
    }
    .status.error {
      display: block;
      background: #fdecec;
      color: #c62828;
    }
    .status.info {
      display: block;
      background: #eef4ff;
      color: #2457c5;
    }
    .receipt-id {
      margin-top: 10px;
      font-weight: 700;
      color: #2457c5;
      word-break: break-all;
    }
    .bottom-logo {
      margin-top: 16px;
      text-align: center;
    }
    .bottom-logo img {
      width: 60px;
      opacity: 0.95;
    }
    .placeholder-sm::placeholder { font-size: 14px; }
    .placeholder-xs::placeholder { font-size: 12px; }

</head>

      <div id="note" class="bottom-note">제출된 의견은 검토 후 처리됩니다.</div>

      <div id="receiptIdBox" class="receipt-id"></div>
    </form>
  </div>
</div>

  let lastSubmitTime = 0;

  const titleEl = document.getElementById("title");
  const descEl = document.getElementById("desc");
  const nameLabel = document.getElementById("nameLabel");
  const companyLabel = document.getElementById("companyLabel");
  const locationLabel = document.getElementById("locationLabel");
  const contentLabel = document.getElementById("contentLabel");
  const photoLabel = document.getElementById("photoLabel");
  const photoHelp = document.getElementById("photoHelp");
  const noteEl = document.getElementById("note");
  const submitBtn = document.getElementById("submitBtn");
  const statusEl = document.getElementById("status");
  const receiptIdBox = document.getElementById("receiptIdBox");

  const nameInput = document.getElementById("name");
  const companyInput = document.getElementById("company");
  const locationInput = document.getElementById("location");
  const contentInput = document.getElementById("content");

  function applyLang(lang) {
    currentLang = lang;
    const t = i18n[lang] || i18n.ko;

    titleEl.innerText = t.title;
    descEl.innerText = t.desc;
    nameLabel.innerText = t.name;
    companyLabel.innerText = t.company;
    locationLabel.innerText = t.location;
    contentLabel.innerText = t.content;
    photoLabel.innerText = t.photo;
    photoHelp.innerText = t.photoHelp;
    noteEl.innerText = t.note;
    submitBtn.innerText = t.submit;

    nameInput.placeholder = t.placeholders.name;
    companyInput.placeholder = t.placeholders.company;
    locationInput.placeholder = t.placeholders.location;
    contentInput.placeholder = t.placeholders.content;

    [nameInput, companyInput, locationInput, contentInput].forEach(adjustPlaceholderSize);

    document.querySelectorAll(".flag").forEach(el => {
      el.classList.toggle("active", el.dataset.lang === lang);
    });

    if (lang === "ar") {
      document.documentElement.dir = "rtl";
      document.body.style.textAlign = "right";
    } else {
      document.documentElement.dir = "ltr";
      document.body.style.textAlign = "";
    }
  }

  document.querySelectorAll(".flag").forEach(flag => {
    flag.addEventListener("click", () => applyLang(flag.dataset.lang));
  });

  applyLang("ko");

  document.getElementById("feedbackForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    if (isSubmitting) return;

    const t = i18n[currentLang] || i18n.ko;
    const now = Date.now();

    if (now - lastSubmitTime < 15000) {
      statusEl.className = "status error";
      statusEl.innerText = "잠시 후 다시 시도해주세요. (15초 제한)";
      receiptIdBox.innerText = "";
      return;
    }

    const name = nameInput.value.trim();
    const company = companyInput.value.trim();
    const location = locationInput.value.trim();
    const content = contentInput.value.trim();
    const website = document.getElementById("website").value.trim();
    const photo = document.getElementById("photo").files[0];

    if (!company || !location || !content) {
      statusEl.className = "status error";
      statusEl.innerText = t.required;
      receiptIdBox.innerText = "";
      return;
    }

    isSubmitting = true;
    submitBtn.disabled = true;
    statusEl.className = "status info";
    statusEl.innerText = t.submitting;
    receiptIdBox.innerText = "";

    try {
      const fd = new FormData();
      fd.append("name", name);
      fd.append("company", company);
      fd.append("location", location);
      fd.append("content", content);
      fd.append("website", website);

      if (photo) {
        const compressed = await fileToCompressedDataURL(photo, 1280, 1280, 0.72);
        fd.append("photoDataUrl", compressed);
        fd.append("photoName", normalizePhotoName(photo.name));
      }

      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        body: fd
      });

      const json = await res.json();

      if (json.success || json.ok) {
        lastSubmitTime = Date.now();
        statusEl.className = "status success";
        statusEl.innerText = t.success;
        receiptIdBox.innerText = `${t.receiptId}: ${json.receiptId || ""}`;
        this.reset();
      } else {
        statusEl.className = "status error";
        statusEl.innerText = json.message || t.fail;
        receiptIdBox.innerText = "";
      }
    } catch (err) {
      statusEl.className = "status error";
      statusEl.innerText = t.fail;
      receiptIdBox.innerText = "";
    } finally {
      isSubmitting = false;
      submitBtn.disabled = false;
    }
  });

  async function fileToCompressedDataURL(file, maxW = 1280, maxH = 1280, quality = 0.72) {
    const bitmap = await createImageBitmap(file);

    let width = bitmap.width;
    let height = bitmap.height;

    const ratio = Math.min(maxW / width, maxH / height, 1);
    width = Math.round(width * ratio);
    height = Math.round(height * ratio);

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(bitmap, 0, 0, width, height);

    return canvas.toDataURL("image/jpeg", quality);
  }

  function normalizePhotoName(fileName) {
    const base = String(fileName || "photo").replace(/\.[^.]+$/, "");
    return base + ".jpg";
  }

  function adjustPlaceholderSize(el) {
    el.classList.remove("placeholder-sm", "placeholder-xs");

    const len = (el.placeholder || "").length;
    if (len >= 28) {
      el.classList.add("placeholder-xs");
    } else if (len >= 20) {
      el.classList.add("placeholder-sm");
    }
  }
</script>
</body>
</html>
