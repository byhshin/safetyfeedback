<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전보건 의견 접수</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 20px;
    background: #f3f4f6;
    font-family: Arial, "Malgun Gothic", sans-serif;
    color: #111827;
  }

  .wrap {
    max-width: 720px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  .lang-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-end;
    margin-bottom: 10px;
    direction: ltr;
  }

  .flag {
    width: 32px;
    height: 22px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #ccc;
    object-fit: cover;
    background: #fff;
  }

  .flag.active {
    border: 2px solid #2563eb;
  }

  h1 {
    text-align: center;
    margin: 0 0 10px;
    font-size: 24px;
  }

  .desc {
    text-align: center;
    margin-bottom: 20px;
    color: #6b7280;
    line-height: 1.6;
  }

  .field {
    margin-bottom: 15px;
  }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    background: #fff;
  }

  textarea {
    min-height: 120px;
    resize: vertical;
  }

  .photo-help {
    margin-top: 8px;
    color: #6b7280;
    font-size: 13px;
    line-height: 1.5;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s ease, filter 0.2s ease;
  }

  .submit-btn:disabled {
    opacity: 0.7;
    filter: brightness(0.9);
    cursor: not-allowed;
  }

  .bottom-note {
    text-align: center;
    margin-top: 15px;
    color: #6b7280;
    line-height: 1.6;
  }

  .bottom-logo {
    text-align: center;
    margin-top: 10px;
  }

  .bottom-logo img {
    width: 120px;
    opacity: 0.8;
  }

  .status {
    text-align: center;
    margin-top: 12px;
    font-weight: bold;
    min-height: 24px;
    line-height: 1.5;
  }

  .status.success {
    color: #15803d;
  }

  .status.error {
    color: #dc2626;
  }

  .receipt-id {
    text-align: center;
    margin-top: 8px;
    font-weight: 700;
    color: #15803d;
    min-height: 24px;

</style>
</head>

    </div>

    <button class="submit-btn" id="submitBtn" type="submit">접수하기</button>

    <div id="note" class="bottom-note">제출된 의견은 검토 후 처리됩니다.</div>
    <div class="bottom-logo">

  let isSubmitting = false;

  function applyLang(lang) {
    const t = i18n[lang] || i18n.ko;

    document.getElementById("title").innerText = t.title;
    document.getElementById("desc").innerText = t.desc;
    document.getElementById("nameLabel").innerText = t.name;
    document.getElementById("companyLabel").innerText = t.company;
    document.getElementById("locationLabel").innerText = t.location;
    document.getElementById("contentLabel").innerText = t.content;
    document.getElementById("photoLabel").innerText = t.photo;
    document.getElementById("photoHelp").innerText = t.photoHelp;
    document.getElementById("submitBtn").innerText = t.submit;
    document.getElementById("note").innerText = t.note;

    document.getElementById("name").placeholder = t.placeholders.name;
    document.getElementById("company").placeholder = t.placeholders.company;
    document.getElementById("location").placeholder = t.placeholders.location;
    document.getElementById("content").placeholder = t.placeholders.content;

    document.body.dir = (lang === "ar") ? "rtl" : "ltr";
    document.querySelector(".lang-bar").style.direction = "ltr";
  }

  function updateFlags(lang) {
    document.querySelectorAll(".flag").forEach(flag => {
      flag.classList.toggle("active", flag.dataset.lang === lang);
    });
  }

  function changeLang(lang) {
    localStorage.setItem("lang", lang);
    applyLang(lang);
    updateFlags(lang);
  }

  window.addEventListener("load", () => {
    const lang = localStorage.getItem("lang") || "ko";
    changeLang(lang);
  });

  document.getElementById("form").addEventListener("submit", async function (e) {
    e.preventDefault();

    if (isSubmitting) return;

    const lang = localStorage.getItem("lang") || "ko";
    const t = i18n[lang] || i18n.ko;

    const nameEl = document.getElementById("name");
    const companyEl = document.getElementById("company");
    const locationEl = document.getElementById("location");
    const contentEl = document.getElementById("content");
    const photoEl = document.getElementById("photo");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const receiptIdBox = document.getElementById("receiptIdBox");

    const name = nameEl.value.trim();
    const company = companyEl.value.trim();
    const location = locationEl.value.trim();
    const content = contentEl.value.trim();
    const photo = photoEl.files[0];

    if (!location || !content) {
      statusEl.className = "status error";
      statusEl.innerText = t.required;
      receiptIdBox.innerText = "";
      return;
    }

    isSubmitting = true;
    submitBtn.disabled = true;
    statusEl.className = "status";
    statusEl.innerText = t.submitting;
    receiptIdBox.innerText = "";

    try {
      const fd = new FormData();
      fd.append("name", name);
      fd.append("company", company);
      fd.append("location", location);
      fd.append("content", content);

      if (photo) {
        const photoDataUrl = await toBase64(photo);
        fd.append("photoDataUrl", photoDataUrl);
        fd.append("photoName", photo.name);
      }

      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        body: fd
      });

      const json = await res.json();

      if (json.success) {
        statusEl.className = "status success";
        statusEl.innerText = t.success;
        receiptIdBox.innerText = `${t.receiptId}: ${json.receiptId || ""}`;
        this.reset();
      } else {
        statusEl.className = "status error";
        statusEl.innerText = json.message || t.fail;
        receiptIdBox.innerText = "";
      }
    } catch (err) {
      statusEl.className = "status error";
      statusEl.innerText = t.fail;
      receiptIdBox.innerText = "";
    } finally {
      isSubmitting = false;
      submitBtn.disabled = false;
    }
  });

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
