<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전보건 의견 접수</title>

<style>
body {
  margin:0;
  padding:20px;
  background:#f3f4f6;
  font-family:Arial, "Malgun Gothic", sans-serif;
}

.wrap {
  max-width:720px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:20px;
}

.lang-bar {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:flex-end;
  margin-bottom:10px;
}

.flag {
  width:32px;
  height:22px;
  cursor:pointer;
  border-radius:4px;
  border:1px solid #ccc;
}

.flag.active {
  border:2px solid #2563eb;
}

h1 {text-align:center;}
.desc {text-align:center; margin-bottom:20px;}

.field {margin-bottom:15px;}
label {font-weight:bold;}

input, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.submit-btn {
  width:100%;
  padding:15px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:18px;
}

.bottom-note {text-align:center; margin-top:15px;}
.bottom-logo {text-align:center; margin-top:10px;}
.bottom-logo img {width:120px; opacity:0.8;}
.status {text-align:center; margin-top:10px; font-weight:bold;}
</style>
</head>

<body>
<div class="wrap">

<!-- 국기 버튼 -->
<div class="lang-bar">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/KO.png" onclick="changeLang('ko')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/EN.png" onclick="changeLang('en')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/NE.png" onclick="changeLang('ne')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/VI.png" onclick="changeLang('vi')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/TR.png" onclick="changeLang('tr')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/RU.png" onclick="changeLang('ru')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/FR.png" onclick="changeLang('fr')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/ZH.png" onclick="changeLang('zh')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/TH.png" onclick="changeLang('th')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/AR.png" onclick="changeLang('ar')" class="flag">
  <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/flag/UZ.png" onclick="changeLang('uz')" class="flag">
</div>

<h1 id="title">안전보건 의견 접수</h1>
<div id="desc" class="desc">현장의 위험요인 및 개선의견을 작성해주세요.</div>

<form id="form">
  <div class="field">
    <label id="nameLabel">성명</label>
    <input id="name">
  </div>

  <div class="field">
    <label id="companyLabel">업체명</label>
    <input id="company">
  </div>

  <div class="field">
    <label id="locationLabel">위치</label>
    <input id="location">
  </div>

  <div class="field">
    <label id="contentLabel">내용</label>
    <textarea id="content"></textarea>
  </div>

  <div class="field">
    <label id="photoLabel">사진 첨부</label>
    <input type="file" id="photo" accept="image/*">
  </div>

  <button class="submit-btn" id="submitBtn">접수하기</button>

  <div id="note" class="bottom-note">
    제출된 의견은 검토 후 처리됩니다.
  </div>

  <div class="bottom-logo">
    <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/logo.png">
  </div>

  <div id="status" class="status"></div>
</form>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzHJuhC-Jt-9wO-TNN_THnQIcCISCJx_S6uf4DmKaPuZP_sIdC03DCtmHHCkoYxjwCGqg/exec";

const i18n = {
  ko:{title:"안전보건 의견 접수",desc:"현장의 위험요인 및 개선의견을 작성해주세요.",name:"성명",company:"업체명",location:"위치",content:"내용",photo:"사진 첨부",submit:"접수하기",note:"제출된 의견은 검토 후 처리됩니다."},
  en:{title:"Safety Feedback",desc:"Submit safety issues and suggestions.",name:"Name",company:"Company",location:"Location",content:"Content",photo:"Photo",submit:"Submit",note:"Your feedback will be reviewed."},
  ne:{title:"सुरक्षा सुझाव",desc:"कृपया सुझाव दिनुहोस्",name:"नाम",company:"कम्पनी",location:"स्थान",content:"विवरण",photo:"तस्वीर",submit:"पेश गर्नुहोस्",note:"तपाईंको सुझाव समीक्षा गरिनेछ"},
  vi:{title:"Góp ý an toàn",desc:"Vui lòng nhập nội dung",name:"Tên",company:"Công ty",location:"Vị trí",content:"Nội dung",photo:"Ảnh",submit:"Gửi",note:"Ý kiến sẽ được xem xét"},
  tr:{title:"Güvenlik Bildirimi",desc:"Lütfen yazınız",name:"İsim",company:"Şirket",location:"Konum",content:"İçerik",photo:"Fotoğraf",submit:"Gönder",note:"Değerlendirilecektir"},
  ru:{title:"Сообщение безопасности",desc:"Введите данные",name:"Имя",company:"Компания",location:"Место",content:"Содержание",photo:"Фото",submit:"Отправить",note:"Будет рассмотрено"},
  fr:{title:"Retour sécurité",desc:"Veuillez écrire",name:"Nom",company:"Entreprise",location:"Lieu",content:"Contenu",photo:"Photo",submit:"Envoyer",note:"Sera examiné"},
  zh:{title:"安全反馈",desc:"请输入内容",name:"姓名",company:"公司",location:"位置",content:"内容",photo:"照片",submit:"提交",note:"将被审核"},
  th:{title:"ข้อเสนอความปลอดภัย",desc:"กรุณากรอกข้อมูล",name:"ชื่อ",company:"บริษัท",location:"สถานที่",content:"รายละเอียด",photo:"รูปภาพ",submit:"ส่ง",note:"จะถูกตรวจสอบ"},
  ar:{title:"ملاحظات السلامة",desc:"يرجى الإدخال",name:"الاسم",company:"الشركة",location:"الموقع",content:"المحتوى",photo:"صورة",submit:"إرسال",note:"سيتم المراجعة"},
  uz:{title:"Xavfsizlik fikri",desc:"Iltimos yozing",name:"Ism",company:"Kompaniya",location:"Joy",content:"Matn",photo:"Rasm",submit:"Yuborish",note:"Ko‘rib chiqiladi"}
};

function applyLang(lang){
  const t=i18n[lang];
  document.getElementById("title").innerText=t.title;
  document.getElementById("desc").innerText=t.desc;
  document.getElementById("nameLabel").innerText=t.name;
  document.getElementById("companyLabel").innerText=t.company;
  document.getElementById("locationLabel").innerText=t.location;
  document.getElementById("contentLabel").innerText=t.content;
  document.getElementById("photoLabel").innerText=t.photo;
  document.getElementById("submitBtn").innerText=t.submit;
  document.getElementById("note").innerText=t.note;

  document.body.dir = (lang==="ar")?"rtl":"ltr";
}

function changeLang(lang){
  localStorage.setItem("lang",lang);
  applyLang(lang);

  document.querySelectorAll(".flag").forEach(f=>f.classList.remove("active"));
  const index={ko:0,en:1,ne:2,vi:3,tr:4,ru:5,fr:6,zh:7,th:8,ar:9,uz:10};
  document.querySelectorAll(".flag")[index[lang]].classList.add("active");
}

window.onload=()=>{
  const lang=localStorage.getItem("lang")||"ko";
  changeLang(lang);
};

document.getElementById("form").onsubmit=async(e)=>{
  e.preventDefault();

  const status=document.getElementById("status");
  status.innerText="...";

  const fd=new FormData();
  fd.append("name",name.value);
  fd.append("company",company.value);
  fd.append("location",location.value);
  fd.append("content",content.value);

  if(photo.files[0]){
    const base64=await toBase64(photo.files[0]);
    fd.append("photoDataUrl",base64);
    fd.append("photoName",photo.files[0].name);
  }

  const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
  const json=await res.json();

  status.innerText=json.success?"OK":"ERROR";
};

function toBase64(file){
  return new Promise(r=>{
    const reader=new FileReader();
    reader.onload=()=>r(reader.result);
    reader.readAsDataURL(file);
  });
}
</script>
</body>
</html>
