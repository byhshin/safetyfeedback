<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안전보건 의견 접수</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f3f4f6;
      font-family: Arial, "Malgun Gothic", sans-serif;
      color: #111827;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 16px;
    }

    .lang-select {
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }

    .logo-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-box img {
      width: 160px;
      max-width: 100%;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: 24px;
      text-align: center;
    }

    .desc {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .photo-box {
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      padding: 16px;
      background: #f9fafb;
    }

    .photo-btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 12px;
      background: #e8f0ff;
      color: #2563eb;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #bfd3ff;
    }

    .photo-help {
      margin-top: 10px;
      color: #6b7280;
      font-size: 13px;
    }

    #photo {
      display: none;
    }

    .submit-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      background: #2563eb;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .bottom-note {
      text-align: center;
      margin-top: 16px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }

    .bottom-logo {
      text-align: center;
      margin-top: 12px;
    }

    .bottom-logo img {
      width: 120px;
      opacity: 0.75;
    }

    .status {
      margin-top: 14px;
      text-align: center;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <select id="langSelect" class="lang-select">
        <option value="ko">🇰🇷 한국어</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
      </select>
    </div>

    <div class="logo-box">
      <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/logo.png" alt="logo">
    </div>

    <h1 id="pageTitle">안전보건 의견 접수</h1>
    <div id="pageDesc" class="desc">
      현장의 위험요인, 개선의견, 안전 관련 제보를 자유롭게 작성해 주세요.
    </div>

    <form id="feedbackForm">
      <div class="field">
        <label id="labelName" for="name">성명</label>
        <input id="name" name="name" type="text">
      </div>

      <div class="field">
        <label id="labelCompany" for="company">업체명</label>
        <input id="company" name="company" type="text">
      </div>

      <div class="field">
        <label id="labelLocation" for="location">위치</label>
        <input id="location" name="location" type="text" required>
      </div>

      <div class="field">
        <label id="labelContent" for="content">내용</label>
        <textarea id="content" name="content" required></textarea>
      </div>

      <div class="field">
        <label id="labelPhoto">사진 첨부 (선택)</label>
        <div class="photo-box">
          <label id="photoBtnText" for="photo" class="photo-btn">사진 선택</label>
          <input id="photo" name="photo" type="file" accept="image/*">
          <div id="photoHelp" class="photo-help">카메라 촬영 또는 앨범의 사진을 첨부할 수 있습니다.</div>
        </div>
      </div>

      <button id="submitBtn" class="submit-btn" type="submit">접수하기</button>

      <div id="bottomNote" class="bottom-note">
        제출된 의견은 안전관리 담당자가 확인 후 검토합니다.
      </div>

      <div class="bottom-logo">
        <img src="https://raw.githubusercontent.com/byhshin/safetyfeedback/main/logo.png" alt="logo">
      </div>

      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const i18n = {
      ko: {
        pageTitle: "안전보건 의견 접수",
        pageDesc: "현장의 위험요인, 개선의견, 안전 관련 제보를 자유롭게 작성해 주세요.",
        labelName: "성명",
        labelCompany: "업체명",
        labelLocation: "위치",
        labelContent: "내용",
        labelPhoto: "사진 첨부 (선택)",
        photoBtnText: "사진 선택",
        photoHelp: "카메라 촬영 또는 앨범의 사진을 첨부할 수 있습니다.",
        submitBtn: "접수하기",
        bottomNote: "제출된 의견은 안전관리 담당자가 확인 후 검토합니다.",
        placeholders: {
          name: "이름을 입력하세요",
          company: "업체명을 입력하세요",
          location: "위치를 입력하세요",
          content: "내용을 입력하세요"
        },
        categoryOptions: [
          { value: "", text: "선택" },
          { value: "위험요인", text: "위험요인" },
          { value: "개선의견", text: "개선의견" },
          { value: "불안전행동", text: "불안전행동" },
          { value: "기타", text: "기타" }
        ],
        alerts: {
          required: "위치와 내용은 필수 입력입니다.",
          submitting: "접수 중입니다...",
          success: "접수가 완료되었습니다.",
          fail: "접수 중 오류가 발생했습니다."
        }
      },

      ja: {
        pageTitle: "安全衛生ご意見受付",
        pageDesc: "現場の危険要因、改善提案、安全に関する内容を自由にご記入ください。",
        labelName: "氏名",
        labelCompany: "会社名",
        labelLocation: "場所",
        labelContent: "内容",
        labelPhoto: "写真添付（任意）",
        photoBtnText: "写真を選択",
        photoHelp: "カメラ撮影またはアルバムの写真を添付できます。",
        submitBtn: "送信する",
        bottomNote: "提出された内容は安全管理担当者が確認し、検討します。",
        placeholders: {
          name: "氏名を入力してください",
          company: "会社名を入力してください",
          location: "場所を入力してください",
          content: "内容を入力してください"
        },
        categoryOptions: [
          { value: "", text: "選択" },
          { value: "위험요인", text: "危険要因" },
          { value: "개선의견", text: "改善提案" },
          { value: "불안전행동", text: "不安全行動" },
          { value: "기타", text: "その他" }
        ],
        alerts: {
          required: "場所と内容は必須です。",
          submitting: "送信中です...",
          success: "受付が完了しました。",
          fail: "送信中にエラーが発生しました。"
        }
      },

      en: {
        pageTitle: "Safety Feedback Submission",
        pageDesc: "Please freely submit hazards, improvement suggestions, and safety-related feedback from the site.",
        labelName: "Name",
        labelCompany: "Company",
        labelLocation: "Location",
        labelContent: "Details",
        labelPhoto: "Attach Photo (Optional)",
        photoBtnText: "Choose Photo",
        photoHelp: "You can attach a photo from the camera or album.",
        submitBtn: "Submit",
        bottomNote: "Submitted feedback will be reviewed by the safety manager.",
        placeholders: {
          name: "Enter your name",
          company: "Enter company name",
          location: "Enter location",
          content: "Enter details"
        },
        categoryOptions: [
          { value: "", text: "Select" },
          { value: "위험요인", text: "Hazard" },
          { value: "개선의견", text: "Improvement Suggestion" },
          { value: "불안전행동", text: "Unsafe Act" },
          { value: "기타", text: "Other" }
        ],
        alerts: {
          required: "Location and details are required.",
          submitting: "Submitting...",
          success: "Submission completed.",
          fail: "An error occurred during submission."
        }
      }
    };

    function applyLanguage(lang) {
      const t = i18n[lang] || i18n.ko;

      document.documentElement.lang = lang;
      document.getElementById("pageTitle").textContent = t.pageTitle;
      document.getElementById("pageDesc").textContent = t.pageDesc;
      document.getElementById("labelName").textContent = t.labelName;
      document.getElementById("labelCompany").textContent = t.labelCompany;
      document.getElementById("labelLocation").textContent = t.labelLocation;
      document.getElementById("labelContent").textContent = t.labelContent;
      document.getElementById("labelPhoto").textContent = t.labelPhoto;
      document.getElementById("photoBtnText").textContent = t.photoBtnText;
      document.getElementById("photoHelp").textContent = t.photoHelp;
      document.getElementById("submitBtn").textContent = t.submitBtn;
      document.getElementById("bottomNote").textContent = t.bottomNote;

      document.getElementById("name").placeholder = t.placeholders.name;
      document.getElementById("company").placeholder = t.placeholders.company;
      document.getElementById("location").placeholder = t.placeholders.location;
      document.getElementById("content").placeholder = t.placeholders.content;


      t.categoryOptions.forEach(item => {
        const option = document.createElement("option");
        option.value = item.value;
        option.textContent = item.text;
        category.appendChild(option);
      });

      if ([...category.options].some(opt => opt.value === currentValue)) {
        category.value = currentValue;
      }
    }

    document.getElementById("langSelect").addEventListener("change", function () {
      const lang = this.value;
      localStorage.setItem("feedback_lang", lang);
      applyLanguage(lang);
    });

    window.addEventListener("load", function () {
      const savedLang = localStorage.getItem("feedback_lang") || "ko";
      document.getElementById("langSelect").value = savedLang;
      applyLanguage(savedLang);
    });

    document.getElementById("feedbackForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const lang = document.getElementById("langSelect").value || "ko";
      const t = i18n[lang];
      const status = document.getElementById("status");
      const submitBtn = document.getElementById("submitBtn");

      const name = document.getElementById("name").value.trim();
      const company = document.getElementById("company").value.trim();
      const location = document.getElementById("location").value.trim();
      const content = document.getElementById("content").value.trim();
      const photo = document.getElementById("photo").files[0];

      if (!location || !content) {
        status.textContent = t.alerts.required;
        return;
      }

      try {
        submitBtn.disabled = true;
        status.textContent = t.alerts.submitting;

        const formData = new FormData();
        formData.append("name", name);
        formData.append("company", company);
        formData.append("location", location);
        formData.append("content", content);

        if (photo) {
          const photoDataUrl = await fileToDataUrl(photo);
          formData.append("photoName", photo.name);
          formData.append("photoDataUrl", photoDataUrl);
        }

        const response = await fetch("여기에_웹앱_URL", {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          status.textContent = t.alerts.success;
          this.reset();
          document.getElementById("langSelect").value = lang;
          applyLanguage(lang);
        } else {
          status.textContent = result.message || t.alerts.fail;
        }
      } catch (err) {
        status.textContent = t.alerts.fail;
      } finally {
        submitBtn.disabled = false;
      }
    });

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
